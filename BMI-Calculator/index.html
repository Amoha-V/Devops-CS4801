<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMI Calculator</title>

<style>
body{
    margin:0;
    padding:0;
    font-family:Arial, sans-serif;
    background:#f0f4f8;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:30px;
    width:350px;
    border-radius:10px;
    box-shadow:0px 0px 15px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    color:#333;
}

label{
    font-weight:bold;
}

input{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:16px;
}

button{
    width:100%;
    padding:10px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#0056b3;
}

#result{
    margin-top:20px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
}

#category{
    text-align:center;
    color:green;
    font-size:18px;
}
</style>
</head>

<body>

<div class="container">

    <h1>BMI Calculator</h1>

    <label>Height (cm)</label>
    <input type="number" id="height" placeholder="Enter Height">

    <label>Weight (kg)</label>
    <input type="number" id="weight" placeholder="Enter Weight">

    <button onclick="calculateBMI()">Calculate BMI</button>

    <div id="result"></div>
    <div id="category"></div>

</div>

<script>
function calculateBMI(){

    let height = document.getElementById("height").value;
    let weight = document.getElementById("weight").value;

    if(height=="" || weight=="")
    {
        alert("Please enter both Height and Weight");
        return;
    }

    height = height / 100;

    let bmi = weight / (height * height);

    document.getElementById("result").innerHTML =
    "Your BMI is : " + bmi.toFixed(2);

    let category="";

    if(bmi < 18.5)
        category="Underweight";
    else if(bmi >=18.5 && bmi <25)
        category="Normal Weight";
    else if(bmi >=25 && bmi <30)
        category="Overweight";
    else
        category="Obese";

    document.getElementById("category").innerHTML =
    "Category : " + category;
}
</script>

</body>
</html>
