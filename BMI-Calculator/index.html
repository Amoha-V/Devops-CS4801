<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMI Calculator</title>

<style>
body{
    margin:0;
    padding:0;
    font-family:Arial, sans-serif;
    background:#e3f2fd;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:30px;
    width:350px;
    border-radius:12px;
    box-shadow:0px 0px 15px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    color:#222;
}

label{
    font-weight:bold;
}

input, select{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:16px;
}

button{
    width:100%;
    padding:10px;
    background:#28a745;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
    margin-bottom:10px;
}

button:hover{
    background:#218838;
}

#reset{
    background:#dc3545;
}

#reset:hover{
    background:#c82333;
}

#result{
    margin-top:15px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
}

#category,#advice{
    text-align:center;
    margin-top:10px;
    font-size:17px;
}
</style>
</head>

<body>

<div class="container">

<h1>BMI Calculator</h1>

<label>Age</label>
<input type="number" id="age" placeholder="Enter Age">

<label>Gender</label>
<select id="gender">
    <option value="Male">Male</option>
    <option value="Female">Female</option>
</select>

<label>Height (cm)</label>
<input type="number" id="height" placeholder="Enter Height">

<label>Weight (kg)</label>
<input type="number" id="weight" placeholder="Enter Weight">

<button onclick="calculateBMI()">Calculate BMI</button>
<button id="reset" onclick="resetForm()">Reset</button>

<div id="result"></div>
<div id="category"></div>
<div id="advice"></div>

</div>

<script>

function calculateBMI(){

    let age=document.getElementById("age").value;
    let height=document.getElementById("height").value;
    let weight=document.getElementById("weight").value;

    if(age=="" || height=="" || weight==""){
        alert("Please fill all details");
        return;
    }

    height=height/100;

    let bmi=weight/(height*height);

    document.getElementById("result").innerHTML=
    "Your BMI is: "+bmi.toFixed(2);

    let category="";
    let advice="";

    if(bmi<18.5){
        category="Underweight";
        advice="Consider a balanced diet and healthy weight gain.";
    }
    else if(bmi<25){
        category="Normal Weight";
        advice="Maintain your current healthy lifestyle.";
    }
    else if(bmi<30){
        category="Overweight";
        advice="Regular exercise and balanced meals are recommended.";
    }
    else{
        category="Obese";
        advice="Consider consulting a health professional.";
    }

    document.getElementById("category").innerHTML=
    "Category: "+category;

    document.getElementById("advice").innerHTML=
    advice;
}


function resetForm(){

    document.getElementById("age").value="";
    document.getElementById("height").value="";
    document.getElementById("weight").value="";
    document.getElementById("result").innerHTML="";
    document.getElementById("category").innerHTML="";
    document.getElementById("advice").innerHTML="";

}

</script>

</body>
</html>
